apiVersion: apps/v1
kind: Deployment
metadata:
  name: react-app-deployment
  labels:
    app: react-frontend
spec:
  replicas: 2  
  selector:
    matchLabels:
      app: react-frontend
  template:
    metadata:
      labels:
        app: react-frontend
    spec:
      containers:
      - name: react-app
        image: my-app:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3000
        env:
        - name: WDS_SOCKET_PORT
          value: "0"
---
apiVersion: v1
kind: Service
metadata:
  name: react-app-service
spec:
  type: NodePort
  selector:
    app: react-frontend
  ports:
    - protocol: TCP
      port: 80          # Порт сервиса внутри кластера
      targetPort: 3000  # Порт приложения в контейнере
      nodePort: 30080   # Порт, по которому приложение будет доступно снаружи
